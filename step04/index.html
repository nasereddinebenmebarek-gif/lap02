<!DOCTYPE html>
<html>
<head>
    <title>GPA Calculator</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="container mt-4">

<h2>GPA Calculator</h2>

<input type="text" id="student" class="form-control mb-2" placeholder="Student Name">
<input type="text" id="semester" class="form-control mb-2" placeholder="Semester">

<table class="table" id="courses">
    <thead>
        <tr>
            <th>Course</th>
            <th>Credits</th>
            <th>Grade</th>
        </tr>
    </thead>
    <tbody></tbody>
</table>

<button class="btn btn-primary" onclick="addCourse()">Add Course</button>
<button class="btn btn-success" onclick="calculateGPA()">Calculate GPA</button>

<h3 id="result"></h3>

<div class="progress mt-3">
    <div id="gpaBar" class="progress-bar" style="width:0%">0</div>
</div>

<a href="export.php" class="btn btn-warning mt-3">Export CSV</a>

<h4 class="mt-4">Previous Records</h4>
<div id="history"></div>

<script>
function addCourse() {
    let row = 
    <tr>
        <td><input class="form-control course"></td>
        <td><input type="number" class="form-control credit"></td>
        <td><input type="number" step="0.01" class="form-control grade"></td>
    </tr>;
    document.querySelector("#courses tbody").innerHTML += row;
}

function calculateGPA() {
    let student = document.getElementById("student").value;
    let semester = document.getElementById("semester").value;

    if (!student || !semester) {
        alert("Fill all fields!");
        return;
    }

    let credits = document.querySelectorAll(".credit");
    let grades = document.querySelectorAll(".grade");

    let totalCredits = 0, totalPoints = 0;

    for (let i = 0; i < credits.length; i++) {
        totalCredits += parseFloat(credits[i].value);
        totalPoints += credits[i].value * grades[i].value;
    }

    if (totalCredits == 0) {
        alert("Credits cannot be 0");
        return;
    }

    let gpa = totalPoints / totalCredits;
    document.getElementById("result").innerText = "GPA: " + gpa.toFixed(2);

    let bar = document.getElementById("gpaBar");
    bar.style.width = (gpa/4)*100 + "%";
    bar.innerText = gpa.toFixed(2);

    if (gpa >= 3.5) bar.className = "progress-bar bg-success";
    else if (gpa >= 3) bar.className = "progress-bar bg-primary";
    else if (gpa >= 2) bar.className = "progress-bar bg-warning";
    else bar.className = "progress-bar bg-danger";

    saveData(student, semester, gpa);
}

function saveData(student, semester, gpa) {
    fetch("save.php", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({student, semester, gpa})
    }).then(()=> loadHistory());
}

function loadHistory() {
    fetch("history.php")
    .then(res=>res.text())
    .then(data=> document.getElementById("history").innerHTML = data);
}

window.onload = loadHistory;
</script>

</body>
</html>
